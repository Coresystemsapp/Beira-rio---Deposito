<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Beira Rio – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04070e;--bg2:#080c18;--bg3:#0d1322;--bg4:#111827;--bg5:#161f30;
  --border:#192235;--border2:#222e42;--blue:#0099ff;--blue2:#33bbff;--blue3:#005faa;
  --gold:#ffaa00;--gold2:#ffd84d;--gold3:#cc7700;--green:#00e676;--red:#ff3355;--wa:#25d366;
  --text:#ddeeff;--text2:#8aadcc;--muted:#3d5570;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--blue3);border-radius:3px;}

/* LOGIN */
#ls{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse 70% 50% at 30% 50%,rgba(0,80,200,.1),transparent 65%);}
.lcard{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--border2);border-radius:24px;width:100%;max-width:400px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03);animation:cIn .5s cubic-bezier(.4,0,.2,1);}
@keyframes cIn{from{transform:translateY(24px) scale(.97);opacity:0}}
.ltop{padding:40px 36px 28px;text-align:center;background:linear-gradient(180deg,rgba(0,80,200,.07),transparent);border-bottom:1px solid var(--border);position:relative;}
.llring{width:140px;height:140px;position:relative;margin:0 auto 16px;}
.llring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--blue2),var(--gold));animation:sp 6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ll{width:134px;height:134px;border-radius:50%;object-fit:cover;object-position:center 15%;position:relative;z-index:1;}
.lbrand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:5px;background:linear-gradient(135deg,var(--blue2),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lrole{font-size:11px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}
.lform{padding:28px 36px 36px;}
.ll2{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;}
.lwrap{position:relative;margin-bottom:10px;}
.lwrap .li2{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.linput{width:100%;background:var(--bg5);border:1px solid var(--border2);border-radius:12px;padding:12px 14px 12px 42px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:all .25s;}
.linput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,153,255,.12);}
.linput::placeholder{color:var(--muted);}
#lpw-inp{letter-spacing:3px;}
.lerr{color:var(--red);font-size:12px;font-weight:700;display:none;padding:9px 14px;background:rgba(255,50,80,.07);border-radius:10px;border:1px solid rgba(255,50,80,.2);margin-bottom:12px;}
.lbtn{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(0,100,220,.35);}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(0,100,220,.55);}
.lhint{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;}

/* LAYOUT */
#app{display:none;}
#sb{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
.sb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.sb-lf{width:52px;height:52px;border-radius:50%;position:relative;flex-shrink:0;}
.sb-lf::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--blue2));opacity:.7;}
.sb-logo{width:48px;height:48px;border-radius:50%;object-fit:cover;object-position:center 15%;position:relative;z-index:1;}
.sb-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2.5px;color:var(--blue2);line-height:1;}
.sb-sub{font-size:9px;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px;}
.role-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.rt-admin{background:rgba(255,180,0,.1);color:var(--gold2);border:1px solid rgba(255,180,0,.2);}
.rt-balcao{background:rgba(0,153,255,.1);color:var(--blue2);border:1px solid rgba(0,153,255,.2);}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto;}
.sb-sec{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:12px 16px 4px;font-weight:800;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-left:3px solid transparent;transition:all .18s;user-select:none;}
.ni:hover{color:var(--text);background:rgba(0,153,255,.06);}
.ni.active{color:var(--blue2);background:rgba(0,153,255,.1);border-left-color:var(--blue2);font-weight:700;}
.ni-i{font-size:17px;width:22px;text-align:center;}
.sb-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.sb-ver{font-size:11px;color:var(--muted);}
.out-btn{background:rgba(255,50,80,.08);border:1px solid rgba(255,50,80,.18);border-radius:8px;color:var(--red);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer;transition:all .2s;}
.out-btn:hover{background:rgba(255,50,80,.16);}
.wa-cfg{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);border-radius:8px;color:var(--wa);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer;transition:all .2s;}
.wa-cfg:hover{background:rgba(37,211,102,.15);}
#main{margin-left:240px;min-height:100vh;}
.topbar{background:rgba(8,12,24,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;}
.tb-right{display:flex;gap:10px;align-items:center;}
.adm-pill{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;}
.ap-admin{background:rgba(255,180,0,.08);color:var(--gold2);border:1px solid rgba(255,180,0,.15);}
.ap-balcao{background:rgba(0,153,255,.08);color:var(--blue2);border:1px solid rgba(0,153,255,.15);}
.page{display:none;padding:24px 28px;}
.page.active{display:block;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;position:relative;overflow:hidden;transition:transform .2s;}
.stat:hover{transform:translateY(-3px);}
.s-icon{font-size:30px;margin-bottom:10px;}
.s-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.s-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;margin-top:4px;}
.sv-g{color:var(--gold2);}.sv-b{color:var(--blue2);}.sv-gr{color:var(--green);}.sv-r{color:var(--red);}
.s-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.s-bar{position:absolute;bottom:0;left:0;right:0;height:3px;}
.sb-g{background:linear-gradient(90deg,var(--gold3),var(--gold2));}.sb-b{background:linear-gradient(90deg,var(--blue3),var(--blue2));}.sb-gr{background:linear-gradient(90deg,#00995a,var(--green));}.sb-r{background:linear-gradient(90deg,#900,var(--red));}

/* CARD/TABLE */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.ch{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.ct{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1.5px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg3);}
th{padding:10px 16px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:800;border-bottom:1px solid var(--border);}
td{padding:11px 16px;font-size:13px;border-top:1px solid rgba(255,255,255,.025);}
tbody tr:hover{background:rgba(0,153,255,.025);}

/* TROCO HIGHLIGHT */
.troco-box{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:10px 14px;margin-top:8px;display:none;}
.troco-box.show{display:block;}
.troco-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.troco-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);letter-spacing:1px;}

/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.st-novo{background:rgba(0,153,255,.1);color:var(--blue2);border:1px solid rgba(0,153,255,.2);}
.st-preparo{background:rgba(255,170,0,.1);color:var(--gold2);border:1px solid rgba(255,170,0,.2);}
.st-saindo{background:rgba(0,150,255,.12);color:#66d9ff;border:1px solid rgba(0,200,255,.25);}
.st-finalizado{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.st-cancelado{background:rgba(255,50,80,.1);color:var(--red);border:1px solid rgba(255,50,80,.18);}
.st-balcao{background:rgba(150,80,255,.1);color:#cc99ff;border:1px solid rgba(150,80,255,.2);}

/* ORDER CARD */
.ocard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;transition:border-color .2s;}
.ocard:hover{border-color:var(--border2);}
.oc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.oc-meta{font-size:11px;color:var(--muted);}.oc-client{font-size:15px;font-weight:800;margin-top:2px;}.oc-tel{font-size:12px;color:var(--text2);}
.oc-addr{font-size:12px;color:var(--text2);background:rgba(0,153,255,.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin:8px 0;display:flex;align-items:flex-start;gap:8px;}
.oc-items{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;}
.oi{font-size:11px;background:var(--bg5);border:1px solid var(--border);border-radius:6px;padding:3px 8px;}
.oc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px solid var(--border);}
.oc-total{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold2);}
.status-flow{display:flex;gap:5px;flex-wrap:wrap;}
.sf-btn{padding:5px 10px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:all .18s;}

/* CLIENTE CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.clicard{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .2s;}
.clicard:hover{transform:translateY(-2px);border-color:var(--border2);}
.clicard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue3),var(--blue2));opacity:0;transition:opacity .2s;}
.clicard:hover::before{opacity:1;}
.cl-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--blue3),#002266);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--blue2);border:2px solid rgba(0,153,255,.2);}
.cl-head{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.cl-name{font-size:15px;font-weight:800;}.cl-tel{font-size:12px;color:var(--muted);margin-top:2px;}
.cl-acts{display:flex;gap:5px;flex-shrink:0;margin-left:auto;}
.cl-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cs{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.cs-l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.cs-v{font-size:17px;font-weight:800;margin-top:2px;}
.cl-last{font-size:11px;color:var(--muted);margin-top:10px;}
.fiado-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(255,50,80,.1);color:var(--red);border:1px solid rgba(255,50,80,.18);margin-left:8px;}

/* BALCÃO */
.bl{display:grid;grid-template-columns:1fr 300px;gap:16px;}
@media(max-width:768px){.bl{grid-template-columns:1fr;}}
.bp{display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--bg4);transition:all .18s;margin-bottom:6px;}
.bp:hover{border-color:rgba(0,153,255,.3);background:rgba(0,153,255,.04);}
.bp-em{font-size:22px;flex-shrink:0;}.bp-inf{flex:1;min-width:0;}
.bp-nm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bp-desc{font-size:10px;color:var(--muted);}
.bp-pr{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold2);flex-shrink:0;}
.bp-qb{background:var(--blue);color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}

/* CHART */
.chart-w{padding:20px 20px 10px;}
.chart{height:160px;display:flex;align-items:flex-end;gap:10px;}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bb{width:100%;border-radius:5px 5px 0 0;min-height:3px;background:linear-gradient(to top,var(--blue3),var(--blue2));box-shadow:0 -2px 10px rgba(0,153,255,.2);transition:height .8s cubic-bezier(.4,0,.2,1);}
.bl2{font-size:10px;color:var(--muted);font-weight:700;}.bv{font-size:10px;font-weight:800;color:var(--blue2);}

/* MISC */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.b-blue{background:rgba(0,153,255,.1);color:var(--blue2);border:1px solid rgba(0,153,255,.18);}
.b-green{background:rgba(0,230,118,.08);color:var(--green);border:1px solid rgba(0,230,118,.15);}
.b-red{background:rgba(255,50,80,.1);color:var(--red);border:1px solid rgba(255,50,80,.15);}
.b-gold{background:rgba(255,180,0,.08);color:var(--gold2);border:1px solid rgba(255,180,0,.15);}
.b-gray{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff;box-shadow:0 2px 12px rgba(0,100,220,.25);}
.btn-blue:hover{box-shadow:0 4px 20px rgba(0,100,220,.45);transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#000;font-weight:800;}
.btn-gold:hover{box-shadow:0 4px 18px rgba(255,170,0,.35);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.04);}
.btn-danger{background:rgba(255,50,80,.1);color:var(--red);border:1px solid rgba(255,50,80,.18);}
.btn-danger:hover{background:rgba(255,50,80,.18);}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:6px;}.btn-icon{padding:5px 7px;}
.fg{display:grid;gap:12px;margin-bottom:12px;}
.fg2{grid-template-columns:1fr 1fr;}.fg3{grid-template-columns:1fr 1fr 1fr;}
.fl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px;}
input,select{background:var(--bg5);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:all .2s;width:100%;}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,153,255,.1);}
input[type=number]{-moz-appearance:textfield;}input[type=number]::-webkit-inner-spin-button{display:none;}
select option{background:var(--bg5);}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(6px);}
.mo.open{display:flex;}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.9);animation:mIn .25s ease;}
@keyframes mIn{from{transform:translateY(18px) scale(.98);opacity:0}}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;}
.mx{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 10px;}
.mx:hover{background:rgba(255,255,255,.1);}
.mb{padding:18px 22px;}.mf{padding:12px 22px 18px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border);}
.sw{position:relative;}.sw input{padding-left:32px;}
.sw::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .18s;}
.pill.active,.pill:hover{background:rgba(0,153,255,.1);color:var(--blue2);border-color:rgba(0,153,255,.25);}
.alerts{padding:12px 16px;display:flex;flex-direction:column;gap:7px;}
.ar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;}
.ar-d{background:rgba(255,50,80,.04);border:1px solid rgba(255,50,80,.14);}
.ar-w{background:rgba(255,140,0,.04);border:1px solid rgba(255,140,0,.14);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:10px;opacity:.3;}
#toast-a{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:9999;}
.tst{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:11px 16px;font-size:13px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tIn .3s ease,tOut .3s ease 2.8s forwards;display:flex;align-items:center;gap:8px;}
.tst.s{border-left:3px solid var(--green);}.tst.e{border-left:3px solid var(--red);}.tst.i{border-left:3px solid var(--blue);}
@keyframes tIn{from{opacity:0;transform:translateX(18px)}}@keyframes tOut{to{opacity:0;transform:translateX(18px)}}
@media(max-width:900px){#sb{width:60px;}.sb-name,.sb-sub,.sb-sec,.ni span,.sb-ver,.role-tag{display:none;}.ni{justify-content:center;padding:11px;}.out-btn,.wa-cfg{font-size:0;padding:5px 8px;}#main{margin-left:60px;}}
@media(max-width:640px){.page{padding:14px;}.topbar{padding:12px 16px;}.sg{grid-template-columns:1fr 1fr;}.fg3,.fg2{grid-template-columns:1fr;}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:768px){.g2{grid-template-columns:1fr;}}
.w100{width:100%;}
</style>
</head>
<body>

// ══ AUTH ══
function doLogin(){
  const user=document.getElementById('luser-inp').value.trim();
  const pw=document.getElementById('lpw-inp').value;
  const u=USERS[user];
  if(u&&u.senha===pw){
    currentRole=u.role;
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    buildUI();
    goPage(currentRole==='admin'?'dash':'balcao');
  }else{
    document.getElementById('lerr').style.display='block';
    document.getElementById('lpw-inp').value='';
  }
}
document.getElementById('lpw-inp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){
  currentRole=null;
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('luser-inp').value='';
  document.getElementById('lpw-inp').value='';
  document.getElementById('lerr').style.display='none';
}

const TITLES={dash:'Dashboard',pedidos:'Pedidos & Entregas',balcao:'Novo Pedido – Balcão',estoque:'Estoque',vendas:isAdmin?'Vendas':'Vendas do Balcão',clientes:'Clientes'};
function goPage(n){
  // Role check
  if(!isAdmin()&&['dash','pedidos','clientes'].includes(n)){toast('Acesso restrito.','e');return;}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
  const pg=document.getElementById('page-'+n);
  if(pg)pg.classList.add('active');
  document.querySelectorAll('.ni').forEach(x=>{if(x.getAttribute('onclick')?.includes("'"+n+"'"))x.classList.add('active');});
  document.getElementById('ptitle').textContent={dash:'Dashboard',pedidos:'Pedidos & Entregas',balcao:'Novo Pedido – Balcão',estoque:'Estoque',vendas:isAdmin()?'Vendas':'Vendas do Balcão',clientes:'Clientes'}[n]||n;
  const ta=document.getElementById('ta');
  ta.innerHTML=n==='estoque'&&isAdmin()?'<button class="btn btn-blue btn-sm" onclick="openProd()">+ Produto</button>':n==='clientes'?'<button class="btn btn-blue btn-sm" onclick="openCli()">+ Cliente</button>':'';
  if(n==='dash')rDash();else if(n==='pedidos')renderPedidos();else if(n==='balcao')rBal();else if(n==='estoque')rEst();else if(n==='vendas')rVendas();else if(n==='clientes')rCli();
}

// ══ DASHBOARD (admin) ══
function rDash(){
  const prods=gP(),vendas=gV(),hoje=new Date().toDateString();
  const vh=vendas.filter(v=>new Date(v.data).toDateString()===hoje);
  const th=vh.reduce((a,v)=>a+v.total,0);
  const tg=vendas.reduce((a,v)=>a+v.total,0);
  const lg=vendas.reduce((a,v)=>a+(v.lucro||0),0);
  const baixo=prods.filter(p=>p.qtd<=p.min);
  document.getElementById('d-stats').innerHTML=`
    <div class="stat"><div class="s-icon">💰</div><div class="s-lbl">Hoje</div><div class="s-val sv-g">${fmt(th)}</div><div class="s-sub">${vh.length} pedido(s)</div><div class="s-bar sb-g"></div></div>
    <div class="stat"><div class="s-icon">📈</div><div class="s-lbl">Receita Total</div><div class="s-val sv-b">${fmt(tg)}</div><div class="s-sub">${vendas.length} vendas</div><div class="s-bar sb-b"></div></div>
    <div class="stat"><div class="s-icon">💹</div><div class="s-lbl">Lucro Estimado</div><div class="s-val sv-gr">${fmt(lg)}</div><div class="s-sub">acumulado</div><div class="s-bar sb-gr"></div></div>
    <div class="stat"><div class="s-icon">⚠️</div><div class="s-lbl">Alertas</div><div class="s-val ${baixo.length>0?'sv-r':'sv-gr'}">${baixo.length}</div><div class="s-sub">baixo estoque</div><div class="s-bar ${baixo.length>0?'sb-r':'sb-gr'}"></div></div>
  `;
  const ae=document.getElementById('d-alerts');
  if(!baixo.length)ae.innerHTML='<div class="empty"><div class="ei">✅</div><p>Estoque OK!</p></div>';
  else ae.innerHTML='<div class="alerts">'+baixo.map(p=>`<div class="ar ${p.qtd===0?'ar-d':'ar-w'}"><span>${p.qtd===0?'🔴':'🟡'}</span><div style="flex:1"><div style="font-size:13px;font-weight:700">${p.nome}</div><div style="font-size:11px;color:var(--muted)">${p.qtd===0?'Esgotado':'Baixo'} — ${p.qtd} ${p.unidade}</div></div><button class="btn btn-ghost btn-sm" onclick="openAj(${p.id})">+ Entrada</button></div>`).join('')+'</div>';
  const re=document.getElementById('d-recent');
  const ls=[...vendas].reverse().slice(0,6);
  if(!ls.length)re.innerHTML='<div class="empty"><div class="ei">🛒</div><p>Sem vendas.</p></div>';
  else re.innerHTML='<table><tbody>'+ls.map(v=>`<tr><td style="font-size:11px;color:var(--muted)">${fmtS(v.data)}</td><td style="font-weight:700">${v.cliente||'Balcão'}</td><td>${statusBadge(v.status||v.modo)}</td><td style="font-weight:800;color:var(--gold2)">${fmt(v.total)}</td></tr>`).join('')+'</tbody></table>';
}

// ══ PEDIDOS (admin) ══
const STMAP={novo:{cl:'st-novo',lbl:'🆕 Novo'},preparo:{cl:'st-preparo',lbl:'🔥 Preparo'},saindo:{cl:'st-saindo',lbl:'🛵 Saindo'},finalizado:{cl:'st-finalizado',lbl:'✅ Finalizado'},cancelado:{cl:'st-cancelado',lbl:'❌ Cancelado'},balcao:{cl:'st-balcao',lbl:'🍺 Balcão'}};
const STFLOW={novo:'preparo',preparo:'saindo',saindo:'finalizado'};
const STNEXT={novo:'🔥 Iniciar preparo',preparo:'🛵 Saiu para entrega',saindo:'✅ Marcar entregue'};
const MODOLBL={entrega:'🛵',retirada:'🏃',balcao:'🍺'};
function statusBadge(s){const m=STMAP[s]||STMAP.novo;return`<span class="status-badge ${m.cl}">${m.lbl}</span>`;}

function renderPedidos(){
  const vendas=gV();
  const novos=vendas.filter(v=>!v.status||v.status==='novo').length;
  const em=vendas.filter(v=>v.status==='preparo'||v.status==='saindo').length;
  const fin=vendas.filter(v=>v.status==='finalizado').length;
  document.getElementById('ped-stats').innerHTML=`
    <div class="stat"><div class="s-icon">🆕</div><div class="s-lbl">Aguardando</div><div class="s-val sv-b">${novos}</div><div class="s-sub">novos pedidos</div><div class="s-bar sb-b"></div></div>
    <div class="stat"><div class="s-icon">🔥</div><div class="s-lbl">Em Andamento</div><div class="s-val sv-g">${em}</div><div class="s-sub">preparo + saindo</div><div class="s-bar sb-g"></div></div>
    <div class="stat"><div class="s-icon">✅</div><div class="s-lbl">Finalizados</div><div class="s-val sv-gr">${fin}</div><div class="s-sub">concluídos</div><div class="s-bar sb-gr"></div></div>
  `;
  const fm=document.getElementById('ped-f-modo').value;
  const fs=document.getElementById('ped-f-st').value;
  const filt=[...vendas].reverse().filter(v=>(!fm||v.modo===fm)&&(!fs||(v.status||'novo')===fs));
  const el=document.getElementById('ped-list');
  if(!filt.length){el.innerHTML='<div class="empty"><div class="ei">🛵</div><p>Nenhum pedido.</p></div>';return;}
  el.innerHTML=filt.map(v=>{
    const st=v.status||(v.modo==='balcao'?'balcao':'novo');
    const nxt=STFLOW[st];
    return`<div class="ocard"><div class="oc-top"><div><div class="oc-meta">#${String(v.id).slice(-6)} · ${fmtD(v.data)}</div><div class="oc-client">${v.cliente||'Balcão'}</div><div class="oc-tel">${v.tel||''}</div></div>
      <div style="display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap">${statusBadge(st)}<span class="badge b-gray">${MODOLBL[v.modo]||'🍺'} ${v.modo||''}</span><span class="badge b-blue">${v.pagamento}</span></div></div>
      ${v.endereco?`<div class="oc-addr"><span>📍</span><div><div style="font-weight:700">${v.endereco.rua}, ${v.endereco.num}${v.endereco.comp?' – '+v.endereco.comp:''}</div><div style="font-size:11px;color:var(--muted)">${v.endereco.bairro}, ${v.endereco.cidade} – ${v.endereco.uf} · CEP ${v.endereco.cep}</div></div></div>`:''}
      <div class="oc-items">${v.items.map(i=>`<div class="oi">${i.qty}× ${i.nome}</div>`).join('')}</div>
      <div class="oc-foot"><div class="status-flow">
        ${nxt?`<button class="sf-btn btn-blue" onclick="advStatus(${v.id},'${nxt}')">${STNEXT[st]}</button>`:''}
        ${st!=='finalizado'&&st!=='cancelado'?`<button class="sf-btn btn-danger" onclick="advStatus(${v.id},'cancelado')">❌ Cancelar</button>`:''}
        <button class="sf-btn btn-ghost btn-sm" onclick="verVenda(${v.id})">Ver</button>
      </div><div class="oc-total">${fmt(v.total)}</div></div></div>`;
  }).join('');
}

function advStatus(id,newSt){
  const vendas=gV();const i=vendas.findIndex(v=>v.id===id);if(i<0)return;
  if(newSt==='cancelado'&&!confirm('Cancelar pedido e restaurar estoque?'))return;
  if(newSt==='cancelado'){const prods=gP();vendas[i].items.forEach(item=>{const pi=prods.findIndex(p=>p.id===item.id);if(pi>=0)prods[pi].qtd+=item.qty;});sP(prods);}
  vendas[i].status=newSt;sV(vendas);
  toast(newSt==='finalizado'?'Pedido finalizado! ✅':newSt==='cancelado'?'Pedido cancelado.':'Status atualizado!',newSt==='cancelado'?'e':'s');
  renderPedidos();
}

// ══ BALCÃO ══
let balCart={},balCat='Todos';
function rBal(){
  const prods=gP(),s=document.getElementById('bal-s').value.toLowerCase();
  const cats=['Todos',...new Set(prods.map(p=>p.categoria))];
  document.getElementById('bal-cats').innerHTML=cats.map(c=>`<button class="pill ${balCat===c?'active':''}" style="font-size:10px;padding:4px 10px;white-space:nowrap" onclick="balCat='${c}';rBal()">${c}</button>`).join('');
  const f=prods.filter(p=>(balCat==='Todos'||p.categoria===balCat)&&(p.nome.toLowerCase().includes(s)||p.marca?.toLowerCase().includes(s)));
  document.getElementById('bal-grid').innerHTML=f.map(p=>{const q=balCart[p.id]||0;return`<div class="bp" onclick="balAdd(${p.id})"><div class="bp-em">${EMOJI[p.categoria]||'🛍'}</div><div class="bp-inf"><div class="bp-nm">${p.nome}</div><div class="bp-desc">${p.marca||''} · ${p.qtd>0?p.qtd+' em estoque':'<span style="color:var(--red)">Esgotado</span>'}</div></div><div class="bp-pr">${fmt(p.preco)}</div>${q>0?`<div class="bp-qb">${q}</div>`:''}</div>`;}).join('')||'<div class="empty"><div class="ei">📦</div><p>Sem produtos.</p></div>';
  rBalItems();
}
function balAdd(id){const p=gP().find(x=>x.id===id);if(!p||p.qtd<=0){toast('Sem estoque!','e');return;}if((balCart[id]||0)>=p.qtd){toast('Máximo atingido!','e');return;}balCart[id]=(balCart[id]||0)+1;rBal();toast(p.nome+' ✓','s');}
function balAdj(id,d){const p=gP().find(x=>x.id===id);if(!p)return;const nv=Math.max(0,Math.min((balCart[id]||0)+d,p.qtd));if(nv===0)delete balCart[id];else balCart[id]=nv;rBal();}
function limBal(){balCart={};rBal();}
function chkBalTroco(){
  const isDin=document.getElementById('bal-pag').value.includes('Dinheiro');
  document.getElementById('bal-troco-area').style.display=isDin?'block':'none';
  if(isDin)calcBalTroco();
}
function calcBalTroco(){
  const total=Object.entries(balCart).reduce((a,[id,q])=>{const p=gP().find(x=>x.id==id);return a+(p?p.preco*q:0);},0);
  const tp=parseFloat(document.getElementById('bal-troco-inp').value)||0;
  const troco=tp-total;
  const el=document.getElementById('bal-troco-val');
  el.textContent=troco>0?fmt(troco):'—';
  el.style.color=troco>0?'var(--green)':'var(--red)';
}
function rBalItems(){
  const prods=gP();
  const items=Object.entries(balCart).map(([id,q])=>{const p=prods.find(x=>x.id==id);return p?{p,q,sub:p.preco*q}:null;}).filter(Boolean);
  const total=items.reduce((a,i)=>a+i.sub,0);
  document.getElementById('bal-tot').textContent=fmt(total);
  calcBalTroco();
  if(!items.length){document.getElementById('bal-items').innerHTML='<div style="text-align:center;padding:18px;color:var(--muted);font-size:13px">Nenhum item</div>';return;}
  document.getElementById('bal-items').innerHTML=items.map(i=>`<div style="display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:12px"><div style="font-weight:700">${i.p.nome}</div><div style="color:var(--gold2);font-size:11px">${fmt(i.p.preco)} × ${i.q} = ${fmt(i.sub)}</div></div><div style="display:flex;align-items:center;gap:5px"><button class="btn btn-ghost btn-sm btn-icon" onclick="balAdj(${i.p.id},-1)">−</button><span style="font-weight:800;min-width:18px;text-align:center">${i.q}</span><button class="btn btn-ghost btn-sm btn-icon" onclick="balAdj(${i.p.id},1)">+</button></div></div>`).join('');
}
function finBal(){
  const prods=gP();
  const items=Object.entries(balCart).map(([id,q])=>{const p=prods.find(x=>x.id==id);return p?{id:+id,nome:p.nome,qty:q,preco:p.preco,custo:p.custo||0,sub:p.preco*q}:null;}).filter(Boolean);
  if(!items.length){toast('Nenhum item!','e');return;}
  const total=items.reduce((a,i)=>a+i.sub,0);
  const lucro=items.reduce((a,i)=>a+(i.preco-i.custo)*i.qty,0);
  const nome=document.getElementById('bal-nome').value.trim()||'Balcão';
  const pagamento=document.getElementById('bal-pag').value.replace(/[^\wÀ-ú ]/g,'').trim();
  const tp=parseFloat(document.getElementById('bal-troco-inp').value)||0;
  const troco=pagamento==='Dinheiro'&&tp>0?tp-total:0;
  const updP=prods.map(p=>{const u=balCart[p.id]||0;return{...p,qtd:p.qtd-u};});
  sP(updP);
  sV([...gV(),{id:Date.now(),data:new Date().toISOString(),cliente:nome,tel:'',pagamento,modo:'balcao',endereco:null,items,subtotal:total,taxa:0,total,lucro,status:'finalizado',troco_para:tp,troco}]);
  const msg=troco>0?`Venda: ${fmt(total)} | Troco: ${fmt(troco)}`:`Venda finalizada! ${fmt(total)}`;
  toast(msg,'s');
  balCart={};
  document.getElementById('bal-nome').value='';
  document.getElementById('bal-troco-inp').value='';
  document.getElementById('bal-troco-area').style.display='none';
  rBal();
}

// ══ ESTOQUE ══
let eF='Todos',eProdId=null;
function rEst(){
  const prods=gP(),s=document.getElementById('est-s').value.toLowerCase();
  const cats=['Todos',...new Set(prods.map(p=>p.categoria))];
  document.getElementById('est-pills').innerHTML=cats.map(c=>`<button class="pill ${eF===c?'active':''}" onclick="eF='${c}';rEst()">${c}</button>`).join('');
  const f=prods.filter(p=>(eF==='Todos'||p.categoria===eF)&&(p.nome.toLowerCase().includes(s)||p.marca?.toLowerCase().includes(s)));
  // Headers
  if(isAdmin()){
    document.getElementById('est-thead-row').innerHTML='<th>Produto</th><th>Categoria</th><th>Preço</th><th>Custo</th><th>Margem</th><th>Qtd</th><th>Mín.</th><th>Status</th><th></th>';
  }else{
    document.getElementById('est-thead-row').innerHTML='<th>Produto</th><th>Categoria</th><th>Preço</th><th>Qtd</th><th>Mín.</th><th>Status</th>';
  }
  document.getElementById('est-tbody').innerHTML=f.map(p=>{
    const stC=p.qtd<=0?'b-red':p.qtd<=p.min?'b-gold':'b-green';
    const stT=p.qtd<=0?'Esgotado':p.qtd<=p.min?'Baixo':'OK';
    const mg=p.custo>0?((p.preco-p.custo)/p.custo*100).toFixed(0)+'%':'—';
    if(isAdmin()){
      return`<tr><td><div style="font-weight:700">${p.nome}</div><div style="font-size:10px;color:var(--muted)">${p.marca||''}</div></td><td><span class="badge b-blue">${p.categoria}</span></td><td style="color:var(--gold2);font-weight:800">${fmt(p.preco)}</td><td style="color:var(--muted)">${fmt(p.custo)}</td><td style="color:var(--green);font-weight:700">${mg}</td><td><b style="font-size:15px">${p.qtd}</b><span style="font-size:10px;color:var(--muted);margin-left:3px">${p.unidade}</span></td><td style="color:var(--muted)">${p.min}</td><td><span class="badge ${stC}">${stT}</span></td><td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm btn-icon" onclick="openAj(${p.id})">📦</button><button class="btn btn-ghost btn-sm btn-icon" onclick="openProd(${p.id})">✏️</button><button class="btn btn-danger btn-sm btn-icon" onclick="delProd(${p.id})">🗑</button></div></td></tr>`;
    }else{
      return`<tr><td><div style="font-weight:700">${p.nome}</div><div style="font-size:10px;color:var(--muted)">${p.marca||''}</div></td><td><span class="badge b-blue">${p.categoria}</span></td><td style="color:var(--gold2);font-weight:800">${fmt(p.preco)}</td><td><b style="font-size:15px">${p.qtd}</b><span style="font-size:10px;color:var(--muted);margin-left:3px">${p.unidade}</span></td><td style="color:var(--muted)">${p.min}</td><td><span class="badge ${stC}">${stT}</span></td></tr>`;
    }
  }).join('')||`<tr><td colspan="${isAdmin()?9:6}"><div class="empty"><div class="ei">📦</div><p>Nenhum produto.</p></div></td></tr>`;
}

let ajId=null;
function openAj(id){const p=gP().find(x=>x.id===id);ajId=id;document.getElementById('aj-nm').textContent=`${p.nome} — Atual: ${p.qtd} ${p.unidade}`;document.getElementById('aj-qtd').value='';document.getElementById('aj-obs').value='';document.getElementById('aj-op').value='e';openM('m-aj');}
function doAj(){const qtd=parseInt(document.getElementById('aj-qtd').value)||0;if(!qtd){toast('Informe quantidade.','e');return;}const op=document.getElementById('aj-op').value;const prods=gP();const i=prods.findIndex(p=>p.id===ajId);if(op==='e')prods[i].qtd+=qtd;else if(op==='s')prods[i].qtd=Math.max(0,prods[i].qtd-qtd);else prods[i].qtd=qtd;sP(prods);toast('Estoque atualizado!','s');closeM('m-aj');rEst();}
function openProd(id=null){if(!isAdmin()){toast('Sem permissão.','e');return;}eProdId=id;document.getElementById('mp-title').textContent=id?'Editar Produto':'Novo Produto';if(id){const p=gP().find(x=>x.id===id);document.getElementById('p-nome').value=p.nome;document.getElementById('p-cat').value=p.categoria;document.getElementById('p-preco').value=p.preco;document.getElementById('p-custo').value=p.custo||'';document.getElementById('p-un').value=p.unidade;document.getElementById('p-qtd').value=p.qtd;document.getElementById('p-min').value=p.min;document.getElementById('p-marca').value=p.marca||'';}else{['p-nome','p-preco','p-custo','p-qtd','p-min','p-marca'].forEach(f=>document.getElementById(f).value='');document.getElementById('p-cat').value='Cervejas';document.getElementById('p-un').value='unid';}openM('m-prod');}
function saveProd(){const nome=document.getElementById('p-nome').value.trim();if(!nome){toast('Informe o nome.','e');return;}const d={nome,preco:parseFloat(document.getElementById('p-preco').value)||0,categoria:document.getElementById('p-cat').value,custo:parseFloat(document.getElementById('p-custo').value)||0,unidade:document.getElementById('p-un').value,qtd:parseInt(document.getElementById('p-qtd').value)||0,min:parseInt(document.getElementById('p-min').value)||5,marca:document.getElementById('p-marca').value.trim()};const prods=gP();if(eProdId){const i=prods.findIndex(p=>p.id===eProdId);prods[i]={...prods[i],...d};}else{d.id=Date.now();prods.push(d);}sP(prods);toast(eProdId?'Atualizado!':'Cadastrado!','s');closeM('m-prod');rEst();}
function delProd(id){if(!confirm('Excluir produto?'))return;sP(gP().filter(p=>p.id!==id));rEst();toast('Removido.','i');}

// ══ VENDAS ══

      return`<tr><td style="font-size:11px;color:var(--muted)">#${String(v.id).slice(-5)}</td><td style="font-size:11px;color:var(--muted)">${fmtD(v.data)}</td><td style="font-weight:700">${v.cliente||'Balcão'}</td><td><span class="badge b-gray">${MODOLBL[v.modo]||'🍺'} ${v.modo||''}</span></td><td><span class="badge b-blue">${v.pagamento}</span></td><td>${trocoStr}</td><td style="color:var(--muted);font-size:12px">${v.items?.length||0} item(s)</td><td style="font-weight:800;color:var(--gold2)">${fmt(v.total)}</td><td style="color:var(--green);font-weight:700">${fmt(v.lucro||0)}</td><td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" onclick="verVenda(${v.id})">Ver</button><button class="btn btn-danger btn-sm btn-icon" onclick="delVenda(${v.id})">🗑</button></div></td></tr>`;
    }else{
      return`<tr><td style="font-size:11px;color:var(--muted)">#${String(v.id).slice(-5)}</td><td style="font-size:11px;color:var(--muted)">${fmtD(v.data)}</td><td style="font-weight:700">${v.cliente||'Balcão'}</td><td><span class="badge b-blue">${v.pagamento}</span></td><td>${trocoStr}</td><td style="color:var(--muted);font-size:12px">${v.items?.length||0} item(s)</td><td style="font-weight:800;color:var(--gold2)">${fmt(v.total)}</td></tr>`;
    }
  }).join('')||`<tr><td colspan="${isAdmin()?10:7}"><div class="empty"><div class="ei">💰</div><p>Sem vendas.</p></div></td></tr>`;
}

function verVenda(id){
  const v=gV().find(x=>x.id===id);if(!v)return;
  document.getElementById('mv-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div><div class="fl" style="display:block;margin-bottom:3px">Cliente</div><div style="font-weight:700">${v.cliente||'Balcão'}</div></div>
      <div><div class="fl" style="display:block;margin-bottom:3px">Data</div><div style="font-weight:600;font-size:12px">${fmtD(v.data)}</div></div>
      <div><div class="fl" style="display:block;margin-bottom:3px">Status</div>${statusBadge(v.status||v.modo)}</div>
      <div><div class="fl" style="display:block;margin-bottom:3px">Pagamento</div><span class="badge b-blue">${v.pagamento}</span></div>
      ${v.troco>0?`<div><div class="fl" style="display:block;margin-bottom:3px">Troco para</div><span style="font-weight:700">${fmt(v.troco_para)}</span></div><div><div class="fl" style="display:block;margin-bottom:3px">Troco dado</div><span style="font-weight:700;color:var(--green)">${fmt(v.troco)}</span></div>`:''}
    </div>
    ${v.endereco?`<div style="background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px"><div style="font-weight:700;margin-bottom:4px">📍 Endereço</div><div>${v.endereco.rua}, ${v.endereco.num}${v.endereco.comp?' – '+v.endereco.comp:''}</div><div style="color:var(--muted)">${v.endereco.bairro}, ${v.endereco.cidade} – ${v.endereco.uf} | CEP ${v.endereco.cep}</div></div>`:''}
    <table><thead><tr><th>Produto</th><th>Qtd</th><th>Unit.</th><th>Sub</th></tr></thead>
    <tbody>${(v.items||[]).map(i=>`<tr><td>${i.nome}</td><td>${i.qty}</td><td>${fmt(i.preco)}</td><td style="font-weight:800">${fmt(i.sub)}</td></tr>`).join('')}</tbody></table>
    <div style="display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid var(--border);margin-top:10px">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text2)">TOTAL</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold2)">${fmt(v.total)}</span>
    </div>`;
  openM('m-venda');
}
function delVenda(id){
  if(!isAdmin()){toast('Sem permissão.','e');return;}
  if(!confirm('Excluir venda e restaurar estoque?'))return;
  const vendas=gV();const v=vendas.find(x=>x.id===id);if(!v)return;
  const prods=gP();(v.items||[]).forEach(i=>{const ix=prods.findIndex(p=>p.id===i.id);if(ix>=0)prods[ix].qtd+=i.qty;});
  sP(prods);sV(vendas.filter(x=>x.id!==id));toast('Excluída.','i');rVendas();
  if(document.getElementById('page-pedidos').classList.contains('active'))renderPedidos();
}
function expCSV(){
  const v=gV();let c='ID,Data,Cliente,Tel,Tipo,Endereco,Pagamento,TrocoPara,Troco,Itens,Receita,Lucro\n';
  v.forEach(x=>{const end=x.endereco?`"${x.endereco.rua} ${x.endereco.num} ${x.endereco.bairro} ${x.endereco.cidade}"`:'-';c+=`${x.id},"${fmtD(x.data)}","${x.cliente||'Balcão'}","${x.tel||''}",${x.modo||'balcao'},${end},${x.pagamento},${x.troco_para||0},${x.troco||0},${(x.items||[]).length},${x.total.toFixed(2)},${(x.lucro||0).toFixed(2)}\n`;});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(c);a.download='vendas_beira_rio.csv';a.click();toast('Exportado!','s');
}

// ══ CLIENTES ══
let cliId=null;
function rCli(){
  const clis=gC(),vendas=gV();
  const s=document.getElementById('cli-s').value.toLowerCase();
  const f=clis.filter(c=>c.nome.toLowerCase().includes(s)||c.tel?.includes(s));
  const totalFiado=clis.reduce((a,c)=>a+(c.fiado||0),0);
  const totalRec=vendas.reduce((a,v)=>a+v.total,0);
  document.getElementById('cli-stats').innerHTML=`
    <div class="stat"><div class="s-icon">👥</div><div class="s-lbl">Clientes</div><div class="s-val sv-b">${clis.length}</div><div class="s-sub">cadastrados</div><div class="s-bar sb-b"></div></div>
    <div class="stat"><div class="s-icon">💰</div><div class="s-lbl">Total Compras</div><div class="s-val sv-g">${fmt(totalRec)}</div><div class="s-sub">todos</div><div class="s-bar sb-g"></div></div>
    <div class="stat"><div class="s-icon">📒</div><div class="s-lbl">Total Fiado</div><div class="s-val ${totalFiado>0?'sv-r':'sv-gr'}">${fmt(totalFiado)}</div><div class="s-sub">a receber</div><div class="s-bar ${totalFiado>0?'sb-r':'sb-gr'}"></div></div>`;
  if(!f.length){document.getElementById('cli-grid').innerHTML='<div class="empty"><div class="ei">👥</div><p>Nenhum cliente.</p></div>';return;}
  document.getElementById('cli-grid').innerHTML=f.map(c=>{
    const tc=vendas.filter(v=>v.cliente?.toLowerCase()===c.nome.toLowerCase()).reduce((a,v)=>a+v.total,0);
    const nc=vendas.filter(v=>v.cliente?.toLowerCase()===c.nome.toLowerCase()).length;
    const ult=vendas.filter(v=>v.cliente?.toLowerCase()===c.nome.toLowerCase()).slice(-1)[0];
    const ini=c.nome.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
    const fi=c.fiado||0;
    return`<div class="clicard"><div class="cl-head"><div class="cl-av">${ini}</div><div><div class="cl-name">${c.nome}${fi>0?`<span class="fiado-tag">📒 ${fmt(fi)}</span>`:''}</div><div class="cl-tel">${c.tel||'Sem telefone'}</div></div><div class="cl-acts"><button class="btn btn-ghost btn-sm btn-icon" onclick="openCli(${c.id})">✏️</button><button class="btn btn-danger btn-sm btn-icon" onclick="delCli(${c.id})">🗑</button></div></div>
    <div class="cl-stats"><div class="cs"><div class="cs-l">Total Gasto</div><div class="cs-v" style="color:var(--gold2)">${fmt(tc)}</div></div><div class="cs"><div class="cs-l">Pedidos</div><div class="cs-v">${nc}</div></div></div>
    <div class="cl-last">📅 ${ult?'Última compra: '+fmtS(ult.data):'Nenhuma compra ainda'}</div></div>`;
  }).join('');
}
function openCli(id=null){cliId=id;document.getElementById('mc-title').textContent=id?'Editar Cliente':'Novo Cliente';if(id){const c=gC().find(x=>x.id===id);document.getElementById('c-nome').value=c.nome;document.getElementById('c-tel').value=c.tel||'';document.getElementById('c-email').value=c.email||'';document.getElementById('c-lim').value=c.limite||'';}else{['c-nome','c-tel','c-email','c-lim'].forEach(f=>document.getElementById(f).value='');}openM('m-cli');}
function saveCli(){const nome=document.getElementById('c-nome').value.trim();if(!nome){toast('Informe o nome.','e');return;}const d={nome,tel:document.getElementById('c-tel').value.trim(),email:document.getElementById('c-email').value.trim(),limite:parseFloat(document.getElementById('c-lim').value)||0};const clis=gC();if(cliId){const i=clis.findIndex(c=>c.id===cliId);clis[i]={...clis[i],...d};}else{d.id=Date.now();d.fiado=0;clis.push(d);}sC(clis);toast(cliId?'Atualizado!':'Cadastrado!','s');closeM('m-cli');rCli();}
function delCli(id){if(!confirm('Remover?'))return;sC(gC().filter(c=>c.id!==id));rCli();toast('Removido.','i');}

// ══ UTILS ══
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg,t='i'){const icons={s:'✅',e:'❌',i:'ℹ️'};const el=document.createElement('div');el.className=`tst ${t}`;el.innerHTML=`<span>${icons[t]}</span><span>${msg}</span>`;document.getElementById('toast-a').appendChild(el);setTimeout(()=>el.remove(),3200);}
</script>
</body>
</html>
